# Reusable ESLint + Prettier workflow template (Bun).
# Copy this file into your project's .github/workflows/ directory.
# Requires: package.json with a "lint" script, and an ESLint config that
# extends linting/.eslintrc.base.js (or .eslintrc.typescript.js) from dev-kit.
# For npm-based projects, replace the Bun setup + install steps with:
#   uses: actions/setup-node@v4  (node-version: '22', cache: 'npm')
#   run: npm ci

name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint
